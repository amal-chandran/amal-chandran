name: WakaTime Readme Stats

on:
  schedule:
    # Runs daily at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch: # allows a manual run from the Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with WakaTime stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render WakaTime stats into README
        run: python3 .github/scripts/waka_readme.py

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update WakaTime stats"
            git push
          else
            echo "No changes to commit."
          fi
